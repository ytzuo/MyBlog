<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 幽灵猫咪身体 -->
  <path d="M50 10 
           C 30 10, 15 25, 15 50 
           C 15 75, 20 90, 10 95 
           C 25 90, 35 95, 40 90
           L 50 95
           L 60 90
           C 65 95, 75 90, 90 95
           C 80 90, 85 75, 85 50
           C 85 25, 70 10, 50 10 Z" 
        fill="#f0f0f0" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- 猫耳朵 -->
  <path d="M30 15 L 20 5 L 18 25 Z" fill="#f0f0f0" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
  <path d="M70 15 L 80 5 L 82 25 Z" fill="#f0f0f0" stroke="#333" stroke-width="3" stroke-linejoin="round"/>

  <!-- 眼睛 -->
  <circle cx="35" cy="45" r="4" fill="#333"/>
  <circle cx="65" cy="45" r="4" fill="#333"/>

  <!-- 嘴巴 (小猫嘴) -->
  <path d="M45 52 Q 50 55 55 52" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- 代码元素: </> 符号印在肚子上 -->
  <!-- 增加 stroke 和 stroke-width 来加粗文字 -->
  <text x="50" y="75" font-family="monospace" font-weight="bold" font-size="20" text-anchor="middle" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1.5">&lt;/&gt;</text>
  
  <!-- 尾巴 -->
  <path d="M85 70 Q 95 70 95 60 Q 95 50 85 55" fill="none" stroke="#f0f0f0" stroke-width="3" stroke-linecap="round" />
</svg>