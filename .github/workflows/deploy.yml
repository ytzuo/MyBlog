name: Deploy to Caddy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: blog
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist/"
          target: "/home/blog/MyBlog"
          strip_components: 1
          rm: true  # 清空旧文件

      - name: Reload Caddy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: blog
          key: ${{ secrets.DEPLOY_KEY }}
          script: sudo systemctl reload caddy
